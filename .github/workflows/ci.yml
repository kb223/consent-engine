name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint with ruff
        run: uv run ruff check src/

      - name: Type check with mypy (hard gate)
        run: uv run mypy src/

      - name: Build package (wheel + sdist)
        run: uv build

      - name: CLI smoke test (no network)
        run: uv run consent-engine version

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: "test-key"
          OPENAI_API_KEY: "test-key"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (advertised in README)
        run: docker build -t consent-engine:ci .
